<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 中央災害應變中心 - 馬太鞍溪動態調度後台</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e293b; padding-bottom: 15px; margin-bottom: 20px; }
        .title { font-size: 1.5rem; color: #38bdf8; font-weight: bold; }
        .badge-live { background: #ef4444; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #1e293b; border-radius: 8px; padding: 15px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
        .card-A { border-left: 5px solid #ef4444; } 
        .card-B { border-left: 5px solid #f59e0b; } 
        .card-C { border-left: 5px solid #10b981; } 
        .id { font-family: monospace; font-size: 0.9rem; color: #94a3b8; margin-bottom: 8px; }
        .loc { font-size: 0.8rem; color: #38bdf8; margin-bottom: 10px; }
        .intel-box { background: #0f172a; padding: 10px; border-radius: 6px; font-size: 0.85rem; line-height: 1.5; }
        .intel-item { margin: 4px 0; border-bottom: 1px solid #1e293b; padding-bottom: 4px; color: #cbd5e1; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">📡 馬太鞍溪堰塞湖災情 - 碎形公眾通報實時串流後台</div>
        <div class="badge-live">● LIVE 每 3 秒自動同步</div>
    </div>

    <div id="dashboard-grid" class="grid">
        <p style="color: #64748b;">正在連接中央雲端防災積木資料庫...</p>
    </div>

    <script>
        // 🔥【請在此處替換為你的 Firebase 資料庫網址】🔥
        const firebaseURL = `https://mata-disaster-db-default-rtdb.firebaseio.com/reports.json`;

        async function fetchLiveData() {
            try {
                const response = await fetch(firebaseURL);
                const data = await response.json();
                const grid = document.getElementById('dashboard-grid');
                
                if (!data || Object.keys(data).length === 0) {
                    grid.innerHTML = `<p style="color: #64748b;">📭 目前暫無民眾通報數據。請用手機打開 Demo 網頁點擊按鈕測試！</p>`;
                    return;
                }

                let htmlContent = '';
                
                Object.keys(data).forEach(id => {
                    const report = data[id];
                    let routeClass = 'card-C';
                    if (report.latest_status.startsWith('A')) routeClass = 'card-A';
                    if (report.latest_status.startsWith('B')) routeClass = 'card-B';

                    let intelHtml = '';
                    if (report.accumulated_intel) {
                        Object.keys(report.accumulated_intel).forEach(key => {
                            if (key !== 'init') {
                                intelHtml += `<div class="intel-item"><strong>${key}:</strong> ${report.accumulated_intel[key]}</div>`;
                            }
                        });
                    }
                    if(!intelHtml) intelHtml = `<div style="color:#64748b;">已鎖定坐標，等待後續碎形情資疊加...</div>`;

                    htmlContent += `
                        <div class="card ${routeClass}">
                            <div class="id">🆔 匿名ID: ${report.report_id}</div>
                            <div class="loc">📍 定位: ${report.latitude.toFixed(4)}, ${report.longitude.toFixed(4)}</div>
                            <div style="font-size:0.8rem; margin-bottom:5px; color:#94a3b8;">⏱️ 更新: ${new Date(report.updated_at).toLocaleTimeString()}</div>
                            <div class="intel-box">
                                ${intelHtml}
                            </div>
                        </div>
                    `;
                });

                grid.innerHTML = htmlContent;

            } catch (error) {
                console.error("讀取雲端失敗:", error);
            }
        }

        setInterval(fetchLiveData, 3000);
        fetchLiveData();
    </script>
</body>
</html>
